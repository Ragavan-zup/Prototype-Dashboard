<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Instant Test</title>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:Inter,system-ui,sans-serif; background:#f8fafc; color:#0f172a; min-height:100vh; display:grid; place-items:center; }
    .card { background:#fff; border:1px solid #e2e8f0; border-radius:16px; padding:32px 36px; max-width:480px; box-shadow:0 4px 12px rgba(15,23,42,0.06); }
    h1 { margin:0 0 8px; font-size:24px; }
    p  { margin:0; color:#64748b; font-size:14px; line-height:1.5; }
    .badge { display:inline-flex; align-items:center; gap:6px; height:22px; padding:0 8px; border-radius:6px; background:#fff3ed; color:#fd5000; font-size:11px; font-weight:600; text-transform:uppercase; letter-spacing:0.04em; margin-bottom:12px; }
    .badge::before { content:""; width:6px; height:6px; border-radius:50%; background:#fd5000; }
  </style>
</head>
<body>
  <div class="card">
    <div class="badge">Instant Test · main</div>
    <h1>Starter prototype</h1>
    <p>Edit this file, commit, or branch off to create variations. Each branch shows up in the dashboard as a version.</p>
  </div>
</body>
</html>
